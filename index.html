<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project in Development</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
            background-color: #000;
        }

        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="game"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            backgroundColor: '#000000',
            render: {
                antialias: true,
                antialiasGL: true
            },
            scene: {
                preload: preload,
                create: create,
                update: update
            }
        };

        const game = new Phaser.Game(config);

        function preload() {
            this.load.image('logo', 'PopCap_Logo.jpg');
        }

        function create() {
            const width = this.cameras.main.width;
            const height = this.cameras.main.height;

            const logo = this.add.image(width / 2, height / 2, 'logo');

            if (logo.width > 400) {
                logo.setScale(400 / logo.width);
            }

            const devText = this.add.text(
                width / 2,
                height / 2,
                'THIS PROJECT IS IN DEVELOPMENT',
                {
                    fontSize: '48px',
                    fontFamily: 'Arial, sans-serif',
                    color: '#ffffff',
                    fontStyle: 'bold',
                    align: 'center',
                    wordWrap: { width: width - 100 }
                }
            );
            devText.setOrigin(0.5, 0.5);
            devText.setAlpha(0);

            this.tweens.add({
                targets: logo,
                alpha: 0,
                duration: 1000,
                delay: 2000,
                ease: 'Power2.inOut'
            });

            this.tweens.add({
                targets: devText,
                alpha: 1,
                duration: 1000,
                delay: 3000,
                ease: 'Power2.inOut'
            });

            window.addEventListener('resize', () => {
                const newWidth = window.innerWidth;
                const newHeight = window.innerHeight;

                logo.setPosition(newWidth / 2, newHeight / 2);
                devText.setPosition(newWidth / 2, newHeight / 2);

                devText.setStyle({
                    wordWrap: { width: newWidth - 100 }
                });
            });
        }

        function update() {
        }

        window.addEventListener('resize', () => {
            game.scale.resize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
